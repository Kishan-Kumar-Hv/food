<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Goods Transaction Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Blockchain Goods Transaction System</h1>

  <form id="transactionForm">
    <input type="text" id="sender" placeholder="Enter Sender Name (Farmer)">
    <input type="text" id="receiver" placeholder="Enter Receiver Name (Warehouse)">
    <input type="text" id="vehicle" placeholder="Vehicle Details" required><br>
    <input type="text" id="goods" placeholder="Goods Type" required><br>
    <input type="number" id="quantity" placeholder="Quantity" required><br>
    <input type="text" id="transportCost" placeholder="Transport Cost" required><br><br>
    <button type="submit">Send Transaction</button>
  </form>

  <hr>

  <!-- ================= WAREHOUSE: PAYMENT ================= -->
  <h2>Warehouse → Pay for Goods</h2>

  <form id="paymentForm">
    <input type="text" id="payer" placeholder="Warehouse Name" required>
    <input type="text" id="payee" placeholder="Farmer Name" required>

    <input type="number" id="payQuantity" placeholder="Quantity" required>
    <input type="number" id="pricePerUnit" placeholder="Price per Unit" required>

    <button type="submit">Pay Amount</button>
  </form>

  <div id="output"></div>

  <script src="script.js"></script>
</body>
</html>
